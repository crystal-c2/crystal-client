syntax = "proto3";

option csharp_namespace = "Server.Beacons";

package beacon;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service BeaconService {
  rpc StreamSessions (google.protobuf.Empty) returns (stream BeaconSession);
  rpc DeleteBeacon (DeleteBeaconRequest) returns (google.protobuf.Empty);
}

message BeaconSession {
  uint32 beacon_id                     = 1;
  optional uint32 parent_id            = 2;
  string listener                      = 3;
  string user                          = 4;
  optional string impersonated         = 5;
  string computer                      = 6;
  string process                       = 7;
  int32 pid                            = 8;
  uint32 major_version                 = 9;
  uint32 minor_version                 = 10;
  uint32 build_version                 = 11;
  int32 charset                        = 12;
  string internal_ip                   = 13;
  bool is_admin                        = 14;
  BeaconArch arch                      = 15;
  google.protobuf.Timestamp first_seen = 16;
  google.protobuf.Timestamp last_seen  = 17;
  BeaconHealth health                  = 18;
}

enum BeaconArch {
  BEACON_ARCH_UNKNOWN = 0;
  BEACON_ARCH_X86     = 1;
  BEACON_ARCH_X64     = 2;
}

enum BeaconHealth {
  BEACON_HEALTH_UNKNOWN = 0;
  BEACON_HEALTH_ALIVE   = 1;
  BEACON_HEALTH_LOST    = 2;
  BEACON_HEALTH_DEAD    = 3;
}

message DeleteBeaconRequest {
  uint32 beacon_id = 1;
}